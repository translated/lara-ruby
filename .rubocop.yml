# Custom rubocop configuration for Lara Ruby SDK

plugins:
  - rubocop-performance

AllCops:
  DisplayCopNames: true
  NewCops: enable
  TargetRubyVersion: 2.6.0
  Exclude:
    - lara-sdk.gemspec
    - vendor/**/*
    - tmp/**/*
    - log/**/*

# Layout
Layout/LineLength:
  Max: 100

Layout/SpaceAroundOperators:
  Enabled: true

Layout/SpaceInsideHashLiteralBraces:
  Enabled: true

# Style
Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

Style/StringLiterals:
  Enabled: true
  EnforcedStyle: double_quotes

Style/SymbolArray:
  Enabled: true

Style/ModuleFunction:
  EnforcedStyle: extend_self

Style/Documentation:
  Enabled: true

# Metrics
Metrics/MethodLength:
  Max: 30
  Exclude:
    - "**/*_spec.rb"

Metrics/ClassLength:
  Max: 150
  Exclude:
    - "**/*_spec.rb"

Metrics/BlockLength:
  Exclude:
    - "**/*_spec.rb"

Metrics/ParameterLists:
  Max: 8

Metrics/AbcSize:
  Max: 20

# Lint
Lint/EmptyBlock:
  Enabled: true

Lint/UnusedMethodArgument:
  Enabled: true

Lint/DuplicateRequire:
  Enabled: true

# Naming
Naming/FileName:
  Enabled: true
  Exclude:
    - "lib/lara.rb"  # Allow main module file to match gem name

Naming/MethodName:
  Enabled: true

Naming/VariableName:
  Enabled: true

# Security
Security/Open:
  Enabled: true

Security/YAMLLoad:
  Enabled: true

# Performance
Performance/StartWith:
  Enabled: true

Performance/EndWith:
  Enabled: true

Performance/RegexpMatch:
  Enabled: true

# Gemspec
Gemspec/RequiredRubyVersion:
  Enabled: true

# Bundler
Bundler/OrderedGems:
  Enabled: true
